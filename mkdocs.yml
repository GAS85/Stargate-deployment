site_name: Stargate Deployment
site_url: https://Health-Info-Net-AG.github.io/stargate-deployment/
site_author: HIN AG
site_description: >-
  Stargate deployment User documentation. Docker, Helmcharts, Virtual Machine, Azure, etc.

# Repository
repo_name: Health-Info-Net-AG/Stargate-deployment
repo_url: https://github.com/Health-Info-Net-AG/Stargate-deployment
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright HIN AG 2026

# Configuration
theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    primary: orange
  logo: assets/hin_logo_full.png

  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/hin_logo.png
  #icon:
  #  logo: logo

# Plugins
plugins:
  #  - blog
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
  - glightbox
  - print-site

# Additional configuration
extra:
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Health-Info-Net-AG/
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/healthinfonetag/

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

not_in_nav: |
  /docker-compose/*.md

# Page tree
nav:
  - Home: index.md
  - Installation Guide: Installation-guide.md
  - Test Phase: Testing.md
  - Getting started with Stargate:
      - Applications overview: Applications.md
      - Exchange Integration: Exchange-integration.md
      - Mail relay setup: Mail-relay-setup.md
      - DNS Setup: DNS-setup.md
  - Container deployment:
      - Install with Docker: Docker-deploy.md
      - Docker Advanced configuration: Docker-advanced.md
      - Helm deployment: helm-deploy.md
  - VM Images deployment:
      - Azure: vm/Azure-image-install.md
      - VMware: vm/VMware-image-install.md
      - Proxmox: vm/Proxmox-image-install.md
      - Windows 11 pro: vm/Windows11pro-image-install.md
  - VM Images list: vm/VM-images-list.md
  - Support / Contact us: Support.md
