---
workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{4}\.\d{2}\.\d{2}-\d{4}$/'
      when: never
    - if: $CI_COMMIT_TAG
    - when: never


stages:
  - build
  - manifest
  - release

execute_script:
  stage: build
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Running VM images build script..."
    - cd /data/vmimagebuilder
    - ./almaimage.sh
    - echo "VM images were built and uploaded to https://images.vereign.io/"
    - curl -X POST "https://gitlab.hin-infra.ch/api/v4/projects/336/trigger/pipeline" -F token=$HIN_GITLAB_TRIGGER_TOKEN -F ref=main

# Milestone release for manually pushed/UI-created semver tags (v1.0.0).
# Rolls up changes since the previous semver tag.
generate_manifest:
  stage: manifest
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      CONFIG="docker-compose/customer-config-prod.example.sh"
      KEYS="SMIMEKEYS_VERSION POLICY_VERSION IRISAGENT_VERSION MXENGINE_VERSION POLICY_SYNC_VERSION DASHBOARD_VERSION MTACONF_VERSION OPS_AGENT_VERSION DOZZLE_VERSION"
      echo "{" > manifest.json
      echo "  \"version\": \"${CI_COMMIT_TAG}\"," >> manifest.json
      echo "  \"deployment_tag\": \"${CI_COMMIT_TAG}\"," >> manifest.json
      echo "  \"images\": {" >> manifest.json
      FIRST=true
      for KEY in $KEYS; do
        VALUE=$(grep "^${KEY}=" "$CONFIG" | tail -1 | cut -d'"' -f2)
        if [ -n "$VALUE" ]; then
          if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> manifest.json; fi
          printf "    \"%s\": \"%s\"" "$KEY" "$VALUE" >> manifest.json
        fi
      done
      echo "" >> manifest.json
      echo "  }" >> manifest.json
      echo "}" >> manifest.json
    - cat manifest.json
    # Commit manifest to repo so it's accessible as a raw file
    - |
      echo "Committing manifest to manifests/${CI_COMMIT_TAG}.json on main..."
      ENCODED=$(base64 -w0 manifest.json)
      HTTP_STATUS=$(curl --silent --show-error --output commit_response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg branch "main" \
          --arg msg "chore: add manifest for ${CI_COMMIT_TAG} [skip ci]" \
          --arg path "manifests/${CI_COMMIT_TAG}.json" \
          --arg content "$ENCODED" \
          '{branch: $branch, commit_message: $msg, actions: [{action: "create", file_path: $path, content: $content, encoding: "base64"}]}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits")
      case "$HTTP_STATUS" in
        201) echo "Manifest committed to main." ;;
        400) echo "Manifest may already exist, skipping."; cat commit_response.json ;;
        *)   echo "WARNING: Failed to commit manifest (HTTP ${HTTP_STATUS}):"; cat commit_response.json ;;
      esac
  artifacts:
    paths:
      - manifest.json

release_milestone:
  stage: release
  tags:
    - linux
  needs:
    - generate_manifest
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - git fetch --tags --force --quiet origin || true
    - .gitlab/generate-release-notes.sh "${CI_COMMIT_TAG}" > release-notes.md
    - cat release-notes.md
    - |
      HTTP_STATUS=$(curl --silent --show-error --output response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data-urlencode "tag_name=${CI_COMMIT_TAG}" \
        --data-urlencode "name=${CI_COMMIT_TAG}" \
        --data-urlencode "description@release-notes.md" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      case "$HTTP_STATUS" in
        201) echo "Release ${CI_COMMIT_TAG} created." ;;
        409) echo "Release ${CI_COMMIT_TAG} already exists, skipping."; cat response.json ;;
        *)   echo "Release creation failed with HTTP ${HTTP_STATUS}:"; cat response.json; exit 1 ;;
      esac
    - |
      echo "Uploading manifest.json as release asset..."
      curl --silent --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file manifest.json \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/manifest/${CI_COMMIT_TAG}/manifest.json"
      curl --silent --show-error \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data "name=manifest.json" \
        --data "url=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/manifest/${CI_COMMIT_TAG}/manifest.json" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
