---
workflow:
  rules:
    # Tag pipelines (manual semver milestone tags -> release_milestone).
    # Note: tag pipelines passed the `changes` rule below anyway (changes
    # always evaluates true outside branch/MR pipelines) - this makes it explicit.
    - if: $CI_COMMIT_TAG
    - changes:
      - 'docker-compose/**/*'
      when: always
    - when: never

stages:
  - build
  - release

execute_script:
  stage: build
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "Running VM images build script..."
    - cd /data/vmimagebuilder
    - ./almaimage.sh
    - echo "VM images were built and uploaded to https://images.vereign.io/staging/"
    - curl -X POST "https://gitlab.hin-infra.ch/api/v4/projects/336/trigger/pipeline" -F token=$HIN_GITLAB_TRIGGER_TOKEN -F ref=main

# Auto-release per image build: creates a CalVer tag (vYYYY.MM.DD-HHMM) and a
# GitLab release with the changelog in one Releases-API call (CI_JOB_TOKEN).
release_build:
  stage: release
  tags:
    - linux
  needs:
    - execute_script
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - git fetch --tags --force --quiet origin || true
    # Derive the tag from the pipeline creation time so retries are idempotent.
    - TS="${CI_PIPELINE_CREATED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
    - TAG="v$(echo "$TS" | sed -E 's/^([0-9]{4})-([0-9]{2})-([0-9]{2})T([0-9]{2}):([0-9]{2}).*$/\1.\2.\3-\4\5/')"
    - echo "Release tag - ${TAG}"
    - .gitlab/generate-release-notes.sh build "${TAG}" > release-notes.md
    - cat release-notes.md
    - |
      HTTP_STATUS=$(curl --silent --show-error --output response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data-urlencode "tag_name=${TAG}" \
        --data-urlencode "ref=${CI_COMMIT_SHA}" \
        --data-urlencode "name=${TAG}" \
        --data-urlencode "description@release-notes.md" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      case "$HTTP_STATUS" in
        201) echo "Release ${TAG} created." ;;
        409) echo "Release or tag ${TAG} already exists, skipping."; cat response.json ;;
        *)   echo "Release creation failed with HTTP ${HTTP_STATUS}:"; cat response.json; exit 1 ;;
      esac

# Milestone release for manually pushed/UI-created semver tags (v1.0.0).
# Rolls up changes since the previous semver tag. Never matches the CalVer
# build tags (their -HHMM suffix fails the anchor). No image rebuild happens
# on tags (execute_script is branch-gated).
release_milestone:
  stage: release
  tags:
    - linux
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - git fetch --tags --force --quiet origin || true
    - .gitlab/generate-release-notes.sh milestone "${CI_COMMIT_TAG}" > release-notes.md
    - cat release-notes.md
    - |
      HTTP_STATUS=$(curl --silent --show-error --output response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data-urlencode "tag_name=${CI_COMMIT_TAG}" \
        --data-urlencode "name=${CI_COMMIT_TAG}" \
        --data-urlencode "description@release-notes.md" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      case "$HTTP_STATUS" in
        201) echo "Release ${CI_COMMIT_TAG} created." ;;
        409) echo "Release ${CI_COMMIT_TAG} already exists, skipping."; cat response.json ;;
        *)   echo "Release creation failed with HTTP ${HTTP_STATUS}:"; cat response.json; exit 1 ;;
      esac
