---
workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{4}\.\d{2}\.\d{2}-\d{4}$/'
      when: never
    - if: $CI_COMMIT_TAG
    - when: never


stages:
  - build
  - manifest
  - release

execute_script:
  stage: build
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Running VM images build script..."
    - cd /data/vmimagebuilder
    - ./almaimage.sh
    - echo "VM images were built and uploaded to https://images.vereign.io/"
    - curl -X POST "https://gitlab.hin-infra.ch/api/v4/projects/336/trigger/pipeline" -F token=$HIN_GITLAB_TRIGGER_TOKEN -F ref=main

# Milestone release for manually pushed/UI-created semver tags (v1.0.0).
# Rolls up changes since the previous semver tag.
generate_manifest:
  stage: manifest
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      CONFIG="docker-compose/customer-config-prod.example.sh"
      KEYS="SMIMEKEYS_VERSION POLICY_VERSION IRISAGENT_VERSION MXENGINE_VERSION POLICY_SYNC_VERSION DASHBOARD_VERSION MTACONF_VERSION OPS_AGENT_VERSION DOZZLE_VERSION CLAMAV_VERSION POSTGRES_VERSION KEYCLOAK_VERSION VAULT_VERSION APISIX_VERSION NATS_VERSION SEAWEEDFS_VERSION CADDY_VERSION LOKI_VERSION ALLOY_VERSION NODE_EXPORTER_VERSION STALWART_VERSION OAUTH2_PROXY_VERSION"
      echo "{" > manifest.json
      echo "  \"version\": \"${CI_COMMIT_TAG}\"," >> manifest.json
      echo "  \"deployment_tag\": \"${CI_COMMIT_TAG}\"," >> manifest.json
      echo "  \"images\": {" >> manifest.json
      FIRST=true
      for KEY in $KEYS; do
        VALUE=$(grep "^${KEY}=" "$CONFIG" | tail -1 | cut -d'"' -f2)
        if [ -n "$VALUE" ]; then
          if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> manifest.json; fi
          printf "    \"%s\": \"%s\"" "$KEY" "$VALUE" >> manifest.json
        fi
      done
      echo "" >> manifest.json
      echo "  }" >> manifest.json
      echo "}" >> manifest.json
    - cat manifest.json
    # main is push-protected ("No one"), so CI cannot commit directly.
    # Instead: create a feature branch with the manifest and open an MR for a human to merge.
    # MR/branch failures are non-fatal on purpose - they must not break the (30+ min) release pipeline;
    # the manifest can be added by hand as a last resort.
    - |
      if [ -z "$MANIFEST_TOKEN" ]; then
        echo "WARNING: MANIFEST_TOKEN is empty - check the variable's 'Protected' flag vs Protected tags. Skipping manifest MR."
        exit 0
      fi
      BRANCH="manifest/${CI_COMMIT_TAG}"
      ENCODED=$(base64 -w0 manifest.json)

      echo "Creating ${BRANCH} with manifests/${CI_COMMIT_TAG}.json (off main)..."
      HTTP_STATUS=$(curl --silent --show-error --output commit_response.json --write-out "%{http_code}" \
        --request POST \
        --header "PRIVATE-TOKEN: ${MANIFEST_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg branch "$BRANCH" --arg start "main" \
          --arg msg "chore: add manifest for ${CI_COMMIT_TAG}" \
          --arg path "manifests/${CI_COMMIT_TAG}.json" \
          --arg content "$ENCODED" \
          '{branch: $branch, start_branch: $start, commit_message: $msg, actions: [{action: "create", file_path: $path, content: $content, encoding: "base64"}]}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits")
      case "$HTTP_STATUS" in
        201) echo "Branch + commit created." ;;
        400) echo "Branch/file may already exist (re-run?):"; cat commit_response.json ;;
        *)   echo "WARNING: commit failed (HTTP ${HTTP_STATUS}) - add the manifest manually:"; cat commit_response.json; exit 0 ;;
      esac

      echo "Opening MR ${BRANCH} -> main..."
      MR_STATUS=$(curl --silent --show-error --output mr_response.json --write-out "%{http_code}" \
        --request POST \
        --header "PRIVATE-TOKEN: ${MANIFEST_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg src "$BRANCH" --arg tgt "main" \
          --arg title "chore: add manifest for ${CI_COMMIT_TAG}" \
          --arg desc "Automated manifest publish for ${CI_COMMIT_TAG}. Review & merge to expose it at manifests/${CI_COMMIT_TAG}.json on main." \
          '{source_branch: $src, target_branch: $tgt, title: $title, description: $desc, remove_source_branch: true}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests")
      case "$MR_STATUS" in
        201)     echo "MR created: $(jq -r .web_url mr_response.json)" ;;
        409|400) echo "MR may already exist:"; cat mr_response.json ;;
        *)       echo "WARNING: MR creation returned HTTP ${MR_STATUS} - open it manually:"; cat mr_response.json ;;
      esac
  artifacts:
    paths:
      - manifest.json

release_milestone:
  stage: release
  tags:
    - linux
  needs:
    - generate_manifest
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - git fetch --tags --force --quiet origin || true
    - .gitlab/generate-release-notes.sh "${CI_COMMIT_TAG}" > release-notes.md
    - cat release-notes.md
    - |
      HTTP_STATUS=$(curl --silent --show-error --output response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data-urlencode "tag_name=${CI_COMMIT_TAG}" \
        --data-urlencode "name=${CI_COMMIT_TAG}" \
        --data-urlencode "description@release-notes.md" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      case "$HTTP_STATUS" in
        201) echo "Release ${CI_COMMIT_TAG} created." ;;
        409) echo "Release ${CI_COMMIT_TAG} already exists, skipping."; cat response.json ;;
        *)   echo "Release creation failed with HTTP ${HTTP_STATUS}:"; cat response.json; exit 1 ;;
      esac
    - |
      echo "Uploading manifest.json as release asset..."
      curl --silent --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file manifest.json \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/manifest/${CI_COMMIT_TAG}/manifest.json"
      curl --silent --show-error \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data "name=manifest.json" \
        --data "url=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/manifest/${CI_COMMIT_TAG}/manifest.json" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
