# Docker Compose configuration for Stargate Alpha environment
services:
  # ===================
  # Infrastructure
  # ===================

  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}
    container_name: stargate-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # Fix vault data volume permissions
  vault-data-fixer:
    image: hashicorp/vault:${VAULT_VERSION:-1.19.0}
    container_name: stargate-vault-data-fixer
    user: root
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    entrypoint: /bin/sh -c "chown -R vault:vault /vault/data && echo 'Vault data permissions fixed'"
    volumes:
      - vault_data:/vault/data
    networks:
      - stargate-network

  vault:
    image: hashicorp/vault:${VAULT_VERSION:-1.19.0}
    container_name: stargate-vault
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      vault-data-fixer:
        condition: service_completed_successfully
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
    volumes:
      - vault_data:/vault/data
      - ./config/vault:/vault/config:ro
    # ports:
    #   - "8200:8200"
    command: server
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "vault status -address=http://127.0.0.1:8200 || [ $? -eq 2 ]",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stargate-network
    labels:
      - autoheal=true

  seaweedfs:
    image: chrislusf/seaweedfs:${SEAWEEDFS_VERSION:-4.34}
    container_name: stargate-seaweedfs
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<EOF
        {
          "identities": [
            {
              "name": "admin",
              "credentials": [
                {
                  "accessKey": "$${S3_ACCESS_KEY}",
                  "secretKey": "$${S3_SECRET_KEY}"
                }
              ],
              "actions": ["Admin", "Read", "List", "Tagging", "Write"]
            },
            {
              "name": "anonymous",
              "actions": ["Read"]
            }
          ]
        }
        EOF
        exec weed server \
          -dir=/data \
          -s3 \
          -s3.port=8333 \
          -s3.config=/etc/seaweedfs/s3.json \
          -master.volumeSizeLimitMB=100 \
          -volume.max=0
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - seaweedfs_data:/data
    ports:
      - "8333:8333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9333/cluster/status || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # SeaweedFS bucket initialization
  seaweedfs-init:
    image: amazon/aws-cli:2.27.31
    container_name: stargate-seaweedfs-init
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      seaweedfs:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        aws --endpoint-url http://seaweedfs:8333 s3 mb s3://$${S3_BUCKET_NAME} 2>/dev/null || true
        echo "SeaweedFS bucket created successfully"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-stargate-bucket}
    networks:
      - stargate-network

  # Vault initialization container
  vault-init:
    image: hashicorp/vault:${VAULT_VERSION:-1.19.0}
    container_name: stargate-vault-init
    user: root
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      # WireGuard private key (optional - if set, will be written to Vault for irisagent)
      WG_PRIVATE_KEY: ${WG_PRIVATE_KEY:-}
    volumes:
      - ./scripts:/scripts:ro
      - ./secrets:/secrets
    entrypoint: /bin/sh -c "apk add --no-cache jq && /scripts/init-vault.sh"
    networks:
      - stargate-network

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.5.3}
    container_name: stargate-keycloak
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    # Intentionally depends only on the local postgres - no external DB or identity providers
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: "${KEYCLOAK_PUBLIC_URL:-https://localhost:8180}"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command:
      - start
      - --import-realm
    volumes:
      - ./config/keycloak/generated:/opt/keycloak/data/import:ro
    ports:
      - "8181:8080" # Direct HTTP for in-network OIDC discovery via host.docker.internal
    healthcheck:
      test: "{ printf >&3 'GET /realms/master/.well-known/openid-configuration HTTP/1.0\r\nHost: localhost\r\n\r\n'; cat <&3; } 3<>/dev/tcp/localhost/8080 | head -1 | grep 200"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # Forces the Keycloak admin to change their password on first login.
  # Idempotent: if the admin already changed their password (auth with the
  # configured value fails), the script exits cleanly without touching anything.
  keycloak-init:
    image: alpine:3.22
    container_name: stargate-keycloak-init
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: /bin/sh -c "apk add --no-cache curl jq > /dev/null && /scripts/init-keycloak.sh"
    networks:
      - stargate-network

  # Generates /config/apisix/generated/apisix.yaml from the template by
  # substituting KEYCLOAK_APISIX_CLIENT_SECRET with envsubst.
  apisix-init:
    image: alpine:3.22
    container_name: stargate-apisix-init
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    volumes:
      - ./config/apisix/apisix.yaml.template:/templates/apisix.yaml.template:ro
      - ./config/apisix/generated:/output
    environment:
      KEYCLOAK_APISIX_CLIENT_SECRET: ${KEYCLOAK_APISIX_CLIENT_SECRET:-changeme}
    command: >
      sh -c "apk add --no-cache gettext &&
             envsubst '$$KEYCLOAK_APISIX_CLIENT_SECRET' < /templates/apisix.yaml.template > /output/apisix.yaml &&
             echo 'APISIX config generated'"
    networks:
      - stargate-network
    labels:
      - autoheal=true

  nats:
    image: nats:${NATS_VERSION:-2.14-alpine}
    container_name: stargate-nats
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    command:
      - "-m"
      - "8222"
      - "--config"
      - "/etc/nats/nats.conf"
    volumes:
      - ./config/nats:/etc/nats:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - stargate-network
    labels:
      - autoheal=true

  autoheal:
    container_name: autoheal
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    # Version 1.2.0
    image: willfarrell/autoheal@sha256:a2e5e76d239b127081f8f96041a21f9747015b23af439c23ee60de0350c06880
    network_mode: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=300
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    healthcheck:
      test: ps -ef | grep sleep
      interval: 5m00s
      timeout: 10s
      retries: 2
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 200M

  # ===================
  # Applications
  # ===================

  smimekeys-client:
    image: healthinfonetag/smimekeys:${SMIMEKEYS_VERSION:-dev}
    container_name: stargate-smimekeys-client
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      irisagent:
        condition: service_started
    environment:
      # HTTP Server
      HTTP_HOST: ""
      HTTP_PORT: "8080"
      HTTP_READ_TIMEOUT: "120s"
      HTTP_WRITE_TIMEOUT: "120s"
      HTTP_IDLE_TIMEOUT: "180s"

      METRICS_ADDR: ":2112"

      # Database
      DB_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/smimekeys_client"
      DB_LOG_QUERIES: "false"

      # Vault
      PRIVATE_KEY_STORE: "vault"
      VAULT_ADDRESS: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      VAULT_MOUNT_PATH: "secret-smimekeys-client"
      VAULT_KV2_MAX_VERSIONS: "2"
      VAULT_KV2_CAS_REQUIRED: "false"
      VAULT_KV2_DELETE_VERSION_AFTER: "0s"

      # CA Configuration (external CA)
      CERT_CA_ROOT: "false"
      CERT_CA_ADDR: "https://smimekeys-ca-dev.k8s.vereign-cdn.com"
      CERT_CA_EXPIRY: "8760h"
      CERT_CA_PUBLIC_HTTP_ADDR: ""
      CERT_CA_IRISAGENT_DOMAIN: "${CERT_CA_IRISAGENT_DOMAIN:-}"
      CERT_CRL_REFRESH_PERIOD: "30m"

      # IRISAgent integration
      IRISAGENT_ADDR: "http://irisagent:8080"

      # Sync intervals
      PEER_SYNC_INTERVAL: "30m"
      ROOT_SYNC_INTERVAL: "30m"

      # LDAP (disabled - uncomment and set LDAP_ADDR to enable)
      # LDAP_ADDR: "ldap://ldap_server:389"
      # LDAP_USERNAME: "cn=admin,dc=seppmailserver,dc=ch"
      # LDAP_BASE_DN: "ou=publicHINKeys,dc=seppmailserver,dc=ch"

      LOG_LEVEL: "debug"
    ports:
      - "8081:8080"
      - "2113:2112"
    networks:
      - stargate-network
    labels:
      - autoheal=true

  policy:
    image: healthinfonetag/policy:${POLICY_VERSION:-dev}
    container_name: stargate-policy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      # HTTP Server
      HTTP_HOST: ""
      HTTP_PORT: "8080"
      HTTP_IDLE_TIMEOUT: "120s"
      HTTP_READ_TIMEOUT: "60s"
      HTTP_WRITE_TIMEOUT: "60s"

      # Database
      DB_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/policy"
      DB_LOG_QUERIES: "false"
      DB_NOTIFIER_MAX_RETRY_ATTEMPTS: "10"

      # Vault
      VAULT_ADDRESS: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      VAULT_MOUNT_PATH: "secret-policy"

      # Metrics
      METRICS_ADDR: ":2112"

      LOG_LEVEL: "INFO"
    ports:
      - "8082:8080"
      - "2115:2112"
    networks:
      - stargate-network
    labels:
      - autoheal=true

  irisagent:
    image: healthinfonetag/irisagent:${IRISAGENT_VERSION:-dev}
    container_name: stargate-irisagent
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      seaweedfs-init:
        condition: service_completed_successfully
      dashboard:
        condition: service_healthy
    environment:
      # HTTP Server
      HTTP_HOST: ""
      HTTP_PORT: "8080"
      HTTP_IDLE_TIMEOUT: "180s"
      HTTP_READ_TIMEOUT: "60s"
      HTTP_WRITE_TIMEOUT: "60s"
      METRICS_ADDR: ":2112"

      # Database
      DB_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/irisagent"

      # Vault
      VAULT_ADDRESS: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      VAULT_MOUNT_PATH: "secret-irisagent"
      VAULT_KV2_MAX_VERSIONS: "2"
      VAULT_KV2_CAS_REQUIRED: "false"
      VAULT_KV2_DELETE_VERSION_AFTER: "0s"

      # S3
      S3_HOSTNAME: "seaweedfs:8333"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      S3_SECURE: "false"
      S3_BUCKET_NAME: "${S3_BUCKET_NAME:-stargate-bucket}"
      S3_MESSAGE_BUCKET: "${S3_BUCKET_NAME:-stargate-bucket}"

      # External services
      MXENGINE_ADDR: "http://mxengine:8080"
      SMIMEKEYS_ADDR: "http://smimekeys-client:8080"

      # NATS
      NATS_ADDR: "nats://nats:4222"

      # WireGuard
      WG_LOCAL_IP: "${WG_LOCAL_IP}"
      WG_INTERFACE_PORT: "${WG_INTERFACE_PORT:-19818}"
      WG_TRANSPORT_MODE: "${WG_TRANSPORT_MODE:-tcp}"

      # Dashboard config fetch
      REMOTE_CONFIG_URL: "http://dashboard:3000/api/internal/installation-config?service=irisagent"

      LOG_LEVEL: "debug"
    ports:
      - "8083:8080"
      - "2114:2112"
      - "${WG_INTERFACE_PORT:-19818}:${WG_INTERFACE_PORT:-19818}/tcp" # WireGuard tunnel (TCP)
    networks:
      - stargate-network
    labels:
      - autoheal=true

  mxengine:
    image: healthinfonetag/mxengine:${MXENGINE_VERSION:-dev}
    container_name: stargate-mxengine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      seaweedfs-init:
        condition: service_completed_successfully
      irisagent:
        condition: service_started
      dashboard:
        condition: service_healthy
    environment:
      # HTTP Server
      LOG_LEVEL: "info"
      INBOUND_HANDLERS: "json,smtp"
      INBOUND_HTTP_HOST: ""
      INBOUND_HTTP_PORT: "8080"
      INBOUND_HTTP_READ_TIMEOUT: "10s"
      INBOUND_HTTP_WRITE_TIMEOUT: "10s"
      INBOUND_HTTP_IDLE_TIMEOUT: "60s"
      INBOUND_HTTP_MAX_SIZE: "20971520"
      INBOUND_HTTP_PUBLIC_ADDRESS: "${MXENGINE_PUBLIC_ADDRESS:-http://localhost:8084}"

      # SMTP
      INBOUND_SMTP_PUBLIC_HOSTNAME: "localhost"
      INBOUND_SMTP_HOST: ""
      INBOUND_SMTP_PORT: "1587"
      INBOUND_SMTP_APP_NAME: "mxengine local"
      INBOUND_SMTP_MAX_SIZE: "20971520"
      INBOUND_SMTP_TLS: "false"
      INBOUND_SMTP_AUTH: "false"
      INBOUND_SMTP_FORWARD_ENCRYPTED_ON_FAILURE: "false"
      REMOTE_CONFIG_URL: "http://dashboard:3000/api/internal/installation-config?service=mxengine"

      # Database
      DB_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mxengine"
      DB_LOG_QUERIES: "false"

      # S3
      S3_HOSTNAME: "seaweedfs:8333"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      S3_SECURE: "false"
      S3_BUCKET_NAME: "${S3_BUCKET_NAME:-stargate-bucket}"

      # Vault
      VAULT_ADDRESS: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      VAULT_MOUNT_PATH: "secret-mxengine"

      #Smimekeys
      SMIME_ENABLED: "true"
      SMIMEKEYS_ADDR: "http://smimekeys-client:8080"
      SMIME_DOMAIN_CACHE_EXPIRY: "3m"

      # Policy
      POLICY_ADDR: "http://policy:8080"
      POLICY_OUTBOUND: "outbound/delivery"

      # Outbound (disabled for local)
      OUTBOUND_WORKERS: "15"
      OUTBOUND_QUEUE_POLL_INTERVAL: "1s"
      OUTBOUND_MAX_MESSAGE_RETRIES: "30"
      NACK_WAIT_RETRY: "5m"
      SEALER: "false"
      OUTBOUND_SEALER_MX_DOMAIN: "${OUTBOUND_SEALER_MX_DOMAIN}"
      OUTBOUND_SEAL_ADDR: ""
      OUTBOUND_SMTP_HOST: "${OUTBOUND_SMTP_HOST:-stalwart}"
      OUTBOUND_SMTP_PORT: "${OUTBOUND_SMTP_PORT:-10026}"
      OUTBOUND_SMIME_HOST: ""
      OUTBOUND_SMIME_PORT: ""
      OUTBOUND_IRISAGENT_ADDR: "http://irisagent:8080"
      # OUTBOUND_SMTP_USER: "seal@vereign-cdn.com"
      # OUTBOUND_SMTP_PASS: "SecureMessage"
      # OUTBOUND_SMTP_AUTH: "PLAIN"

      # NATS
      NATS_ADDR: "nats://nats:4222"

      # Pending message handling
      PENDING_WATCHER_INTERVAL: "20s"
      PENDING_MESSAGE_EXPIRATION: "1m"

      # Forbidden SMTP for members in the list
      MEMBERS_URL: "https://app.hin.ch/mgw/maildomains"
      MEMBERS_SYNC_INTERVAL: "1h"

      # Archive
      ARCHIVE_INTERVAL: "30m"
      ARCHIVE_RETENTION_PERIOD: "87672h"
      ARCHIVE_BATCH_SIZE: "1000"
      WAIT_BEFORE_ARCHIVE: "2160h"

      # Metrics
      METRICS_ADDR: ":2112"
    ports:
      - "8084:8080"
      - "2116:2112"
    tmpfs:
      - /tmp:size=100M,mode=1777,uid=1001,gid=1001
    networks:
      - stargate-network
    labels:
      - autoheal=true

  apisix:
    image: apache/apisix:${APISIX_VERSION:-3.15.0-debian}
    container_name: stargate-apisix
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      apisix-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    environment:
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:-changeme}
    volumes:
      - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./config/apisix/generated/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
    ports:
      - "9080:9080" # Gateway — main entry point for API traffic
      - "9180:9180" # Admin API (read-only in standalone mode)
      - "9091:9091" # Prometheus metrics
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: "bash -c \"{ printf >&3 'GET /v1/healthcheck  HTTP/1.0\r\nHost: localhost\r\n\r\n'; cat <&3; } 3<>/dev/tcp/localhost/9090 | head -1 | grep 200\" "
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - stargate-network
    labels:
      - autoheal=true

  dashboard:
    image: healthinfonetag/dashboard:${DASHBOARD_VERSION:-dev}
    container_name: stargate-dashboard
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      keycloak:
        condition: service_healthy
      apisix:
        condition: service_healthy
    environment:
      # API gateway base URL (all backend calls go through APISIX)
      BASE_URL: "http://apisix:9080"
      NEXT_PUBLIC_APP_URL: "${DASHBOARD_PUBLIC_URL:-https://localhost}"
      SHOW_DEV_PAGES: "${DASHBOARD_SHOW_DEV_PAGES:-false}"
      IS_ROOT: "false"

      # Stargate deployment release tag (server-side; read at runtime).
      APP_VERSION: "${APP_VERSION:-unknown}"

      # Base URL used by the auth library to construct the OAuth redirect_uri.
      # Must match the URL the browser uses to reach the dashboard.
      NEXTAUTH_URL: "${DASHBOARD_PUBLIC_URL:-https://localhost}"
      AUTH_URL: "${DASHBOARD_PUBLIC_URL:-https://localhost}"

      # Keycloak OIDC
      KEYCLOAK_URL: "${KEYCLOAK_PUBLIC_URL:-https://localhost:8180}"
      KEYCLOAK_REALM: stargate
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_DASHBOARD_CLIENT_ID:-dashboard}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_DASHBOARD_CLIENT_SECRET:-changeme}

      # Database (Prisma)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/dashboard"

      NODE_ENV: production
      # Allow self-signed TLS cert on the Caddy proxy
      NODE_TLS_REJECT_UNAUTHORIZED: "0"

      # Root instance URL and domain (used for cross-instance API calls)
      ROOT_URL: "${DASHBOARD_ROOT_URL:-https://apisix.k8s.vereign-cdn.com}"
      ROOT_DOMAIN: "${DASHBOARD_ROOT_DOMAIN:-vereign-cdn.com}"
      NATS_URL: "nats://nats:4222"

      VAULT_ADDRESS: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      VAULT_MOUNT_PATH: "secret-mtaconf"

      #monitoring
      LOKI_URL: "http://loki:3100"
      LOG_LEVEL: "info"

    networks:
      - stargate-network
    read_only: true
    tmpfs:
      - /tmp:size=50M,noexec
    volumes:
      - dashboard_cache:/app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/liveness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - autoheal=true

  # Caddy reverse proxy — terminates TLS for Keycloak (:8180) and the
  # dashboard (:443), and redirects plain HTTP (:80) to HTTPS.
  caddy:
    image: caddy:${CADDY_VERSION:-2-alpine}
    container_name: stargate-caddy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      keycloak:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/ssl:/etc/caddy/ssl:ro
    ports:
      - "80:80"
      - "443:443"
      - "8180:8180"
      - "8190:8190" # Dozzle (via oauth2-proxy), only backed when DOZZLE_ENABLED=true
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # ===================
  # Monitoring
  # ===================

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.11.1}
    container_name: stargate-node-exporter
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - textfile_collector:/textfile_collector:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.textfile.directory=/textfile_collector"
    ports:
      - "9100:9100"
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # Collects app versions from /liveness endpoints for node-exporter
  version-collector:
    image: alpine:3.22
    container_name: stargate-version-collector
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      - smimekeys-client
      - policy
      - irisagent
      - mxengine
    volumes:
      - ./scripts/gather-app-versions.sh:/scripts/gather-app-versions.sh:ro
      - textfile_collector:/textfile_collector
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Starting version collector (runs every 60s)..."
        while true; do
          sh /scripts/gather-app-versions.sh || echo "Failed to gather versions"
          sleep 60
        done
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # ===================
  # Stalwart MTA (replaces postfixconf)
  # ===================

  clamav:
    image: clamav/clamav:${CLAMAV_VERSION:-1.4}
    container_name: stargate-clamav
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    environment:
      # Start clamav-milter (disabled by default in this image).
      CLAMAV_NO_MILTERD: "false"
    volumes:
      # Persist the virus signature DB so it is not re-downloaded on every restart (freshclam keeps it current in the background).
      - clamav_data:/var/lib/clamav
      - ./config/clamav/clamav-milter.conf:/etc/clamav/clamav-milter.conf:ro
    mem_limit: 1536m
    healthcheck:
      # clamdcheck.sh pings clamd; only healthy once the signature DB is loaded.
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot downloads the full signature DB before clamd accepts pings.
      start_period: 300s
    networks:
      - stargate-network
    labels:
      - autoheal=true

  stalwart:
    image: stalwartlabs/stalwart:${STALWART_VERSION:-v0.16}
    container_name: stargate-stalwart
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STALWART_RECOVERY_ADMIN: "admin:${STALWART_ADMIN_PASSWORD}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - ./config/stalwart/config.json:/etc/stalwart/config.json:ro
      - stalwart_data:/var/lib/stalwart
    ports:
      # :25 is the public MX listener (external SMTP traffic arrives here).
      # :10026 is the internal reinject port — mxengine reaches it via the
      # docker bridge network at `stalwart:10026` and it MUST NOT be
      # exposed on the host, or it becomes an open relay (the MtaStageRcpt
      # rule for :10026 accepts any sender→any recipient as "trusted
      # internal" traffic).
      - "25:25"
    networks:
      - stargate-network
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - autoheal=true

  stalwart-provision:
    build:
      context: ./config/stalwart
      dockerfile: Dockerfile.provision
    container_name: stargate-stalwart-provision
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      stalwart:
        condition: service_healthy
      clamav:
        condition: service_started
    environment:
      STALWART_URL: "http://stalwart:8080"
      STALWART_RECOVERY_ADMIN: "admin:${STALWART_ADMIN_PASSWORD}"
      MTACONF_SVC_PASSWORD: "${MTACONF_SVC_PASSWORD}"
      CLAMAV_MILTER_HOST: "clamav"
      CLAMAV_MILTER_PORT: "7357"
    networks:
      - stargate-network

  mtaconf:
    image: registry.vereign.io/svdh/mtaconf:${MTACONF_VERSION:-dev}
    container_name: stargate-mtaconf
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      stalwart-provision:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
      dashboard:
        condition: service_healthy
    environment:
      HOME: "/tmp"
      STALWART_URL: "http://stalwart:8080"
      STALWART_USER: "mtaconf-svc@mtaconf.local"
      STALWART_PASSWORD: "${MTACONF_SVC_PASSWORD}"
      STALWART_CLI_PATH: "/opt/stalwart-cli"
      VAULT_ADDRESS: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      VAULT_MOUNT_PATH: "secret-mtaconf"
      HTTP_ADDR: ":8080"
      DASHBOARD_CONFIG_URL: "http://dashboard:3000/api/internal/installation-config?service=stalwart"
      LOG_LEVEL: "info"
    tmpfs:
      - /tmp:size=10M,mode=1777,uid=1001,gid=1001
    networks:
      - stargate-network
    labels:
      - autoheal=true

  loki:
    image: grafana/loki:${LOKI_VERSION:-3.4.3}
    container_name: stargate-loki
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - stargate-network
    labels:
      - autoheal=true

  alloy:
    image: grafana/alloy:${ALLOY_VERSION:-v1.16.1}
    container_name: stargate-alloy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      loki:
        condition: service_healthy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    environment:
      LOKI_URL: "${LOKI_URL:-http://loki:3100}"
      LOCAL_LOKI_URL: "http://loki:3100"
      ALLOY_HOSTNAME: "${ALLOY_HOSTNAME:-stargate}"
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # Policy sync service - syncs policies from Git repository to database
  # Automatically syncs policies when POLICY_SYNC_REPO_URL is configured
  policy-sync:
    image: healthinfonetag/policy-sync:${POLICY_SYNC_VERSION:-dev}
    container_name: stargate-policy-sync
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      policy:
        condition: service_started
    environment:
      # Database connection (same as policy service)
      DB_ADDR: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/policy?sslmode=disable"
      # Git repository settings
      POLICY_REPO: "${POLICY_SYNC_REPO_URL}"
      POLICY_REPO_USER: "${POLICY_SYNC_REPO_USER:-}"
      POLICY_REPO_PASS: "${POLICY_SYNC_REPO_PASS:-}"
      POLICY_REPO_BRANCH: "${POLICY_SYNC_REPO_BRANCH:-}"
      POLICY_REPO_FOLDER: "${POLICY_SYNC_REPO_FOLDER:-}"
      # Service mode
      KEEP_ALIVE: "true"
      SYNC_INTERVAL: "${POLICY_SYNC_INTERVAL:-1h}"
    networks:
      - stargate-network
    labels:
      - autoheal=true

  # Ops Agent - executes infrastructure commands (updates, restarts) from dashboard via NATS
  ops-agent:
    image: registry.vereign.io/svdh/stargate-ops:${OPS_AGENT_VERSION:-dev}
    container_name: stargate-ops-agent
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    pid: host
    privileged: true
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/stargate
    environment:
      NATS_URL: "nats://nats:4222"
      COMPOSE_PROJECT_DIR: "/stargate"
      COMPOSE_PROJECT_NAME: "docker-compose"
      HOST_INSTALL_DIR: "${HOST_INSTALL_DIR:-/root/stargate-deployment}"
      LOG_LEVEL: "info"
      # Version keys the dashboard update flow is allowed to change. Must list
      # every *_VERSION present in the release manifest, otherwise the ops-agent
      # rejects the update. App + infra services (overrides the Go default).
      # Stateful services (POSTGRES/VAULT/KEYCLOAK) are updatable but should be
      # bumped deliberately - a recreate runs against the existing data volume.
      ALLOWED_VERSION_KEYS: "SMIMEKEYS_VERSION,POLICY_VERSION,IRISAGENT_VERSION,MXENGINE_VERSION,POLICY_SYNC_VERSION,DASHBOARD_VERSION,MTACONF_VERSION,OPS_AGENT_VERSION,DOZZLE_VERSION,CLAMAV_VERSION,POSTGRES_VERSION,KEYCLOAK_VERSION,VAULT_VERSION,APISIX_VERSION,NATS_VERSION,SEAWEEDFS_VERSION,CADDY_VERSION,LOKI_VERSION,ALLOY_VERSION,NODE_EXPORTER_VERSION,STALWART_VERSION,OAUTH2_PROXY_VERSION"
    networks:
      - stargate-network
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/docker.sock"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - autoheal=true

  # Dozzle - Real-time log viewer for all containers
  # Access at: http://localhost:8090
  dozzle:
    image: amir20/dozzle:${DOZZLE_VERSION:-v10.5.0}
    container_name: stargate-dozzle
    restart: unless-stopped
    profiles: [dozzle]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    environment:
      DOZZLE_FILTER: "name=stargate"
      DOZZLE_HOSTNAME: "${DEPLOYMENT_NAME:-stargate}"
      DOZZLE_NO_ANALYTICS: "true"
      # Authentication is delegated to oauth2-proxy (OIDC -> Keycloak), which
      # injects the identity headers below. Dozzle is intentionally NOT published
      # to the host: it is reachable only via oauth2-proxy on the internal
      # network, so these trusted headers cannot be spoofed from outside.
      DOZZLE_AUTH_PROVIDER: forward-proxy
      DOZZLE_AUTH_HEADER_USER: X-Forwarded-User
      DOZZLE_AUTH_HEADER_EMAIL: X-Forwarded-Email
      DOZZLE_AUTH_HEADER_NAME: X-Forwarded-Preferred-Username
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - stargate-network
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 5m00s
      timeout: 30s
      retries: 2
      start_period: 30s
    labels:
      - autoheal=true

  # oauth2-proxy — OIDC relying party that puts Dozzle behind Keycloak.
  # Runs the browser auth-code flow against Keycloak (realm "stargate", client
  # "dozzle"), then proxies authenticated requests to Dozzle with X-Forwarded-*
  # identity headers. Caddy terminates TLS in front of it on :8190.
  # Any authenticated realm user is allowed (no email-domain restriction).
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:${OAUTH2_PROXY_VERSION:-v7.13.0}
    container_name: stargate-oauth2-proxy
    restart: unless-stopped
    profiles: [dozzle]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      keycloak:
        condition: service_healthy
      dozzle:
        condition: service_started
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: "${KEYCLOAK_PUBLIC_URL}/realms/stargate"
      OAUTH2_PROXY_CLIENT_ID: dozzle
      OAUTH2_PROXY_CLIENT_SECRET: "${KEYCLOAK_DOZZLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_REDIRECT_URL: "${DOZZLE_PUBLIC_URL}/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://dozzle:8080"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      # Behind Caddy, which sets X-Forwarded-Proto/-Host so redirects use https.
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      # Allow any authenticated user; Keycloak users may not have a verified email.
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      # Pass identity to Dozzle as X-Forwarded-User / -Email / -Preferred-Username.
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      # Keycloak presents a self-signed cert on the VM IP; skip TLS verify for the
      # discovery/token calls (mirrors the dashboard's NODE_TLS_REJECT_UNAUTHORIZED=0).
      OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY: "true"
      # Host-only secure cookie (no Domain attribute -> valid for a bare IP host).
      OAUTH2_PROXY_COOKIE_SECURE: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - stargate-network
    labels:
      - autoheal=true

volumes:
  postgres_data:
  vault_data:
  seaweedfs_data:
  stalwart_data:
  clamav_data:
  loki_data:
  alloy_data:
  textfile_collector:
  dashboard_cache:

networks:
  stargate-network:
    driver: bridge
