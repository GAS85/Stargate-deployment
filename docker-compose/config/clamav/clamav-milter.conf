# clamav-milter configuration for the Stargate deployment.
#
# The official clamav/clamav image bundles clamd, freshclam and clamav-milter
# but only starts clamav-milter when CLAMAV_NO_MILTERD=false (see docker-compose).
# Stalwart connects to MilterSocket below at the DATA stage of both SMTP
# listeners (see config/stalwart/provision.sh, MtaMilter "clamav").

# Listen for milter connections on TCP :7357 (Stalwart reaches this as
# clamav:7357 over the docker bridge network). MilterSocket uses the 'inet:'
# scheme (inet:PORT[@host]); with no @host it binds all interfaces.
MilterSocket inet:7357

# clamd runs in the same container, so reach it over its local unix socket
# rather than TCP. This matches the image default (clamd.conf sets
# 'LocalSocket /tmp/clamd.sock'); clamd also listens on TCP 3310 if needed.
ClamdSocket unix:/tmp/clamd.sock

# Reject infected mail at the SMTP level (5xx) so it is never delivered.
OnInfected Reject
OnClean Accept
OnFail Defer

# Stamp scanned mail with an X-Virus-Scanned header (replace any existing one).
AddHeader Replace

# Wait for the signature database / clamd to come up before failing.
Foreground true
LogVerbose false
LogSyslog false

# Largest message the milter will scan. Messages bigger than this are passed
# through UNSCANNED (skipped) -- they are NOT deferred. Roughly matches the
# MTA's max message size.
#
# IMPORTANT: keep this <= clamd's StreamMaxLength, or clamd rejects the oversized
# stream and `OnFail Defer` above gets tripped, leaving large *legitimate* mail
# stuck in the queue. We do not override clamd.conf, so StreamMaxLength is its
# built-in default (100M). Thus this may be raised up to 100M without touching
# clamd; going higher also requires raising clamd's StreamMaxLength (and likely
# MaxScanSize/MaxFileSize) via a clamd.conf override.
MaxFileSize 25M
