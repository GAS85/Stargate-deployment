# ==============================================================================
# Envoy Load Balancer for IDAgent Scaling
# ==============================================================================
# Handles TCP, UDP, HTTP, and metrics traffic for scaled IDAgent instances.
# - WireGuard TCP/UDP: Ring hash (source IP) for sticky sessions
# - HTTP API: Ring hash (source IP) for sticky sessions + health checks
# - Metrics: Round-robin for scraping all replicas
# ==============================================================================

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    # WireGuard TCP tunnel (port 19818)
    - name: wireguard_tcp
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 19818
          protocol: TCP
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: wireguard_tcp
                cluster: idagent_wg_tcp
                idle_timeout: 300s

    # WireGuard UDP tunnel (port 19818)
    - name: wireguard_udp
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 19818
          protocol: UDP
      listener_filters:
        - name: envoy.filters.udp.udp_proxy
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.udp.udp_proxy.v3.UdpProxyConfig
            stat_prefix: wireguard_udp
            matcher:
              on_no_match:
                action:
                  name: route
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.udp.udp_proxy.v3.Route
                    cluster: idagent_wg_udp
            idle_timeout: 300s

    # IDAgent HTTP API (port 8080)
    - name: http_api
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
          protocol: TCP
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: http_api
                codec_type: AUTO
                route_config:
                  name: api_route
                  virtual_hosts:
                    - name: idagent_api
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: idagent_api
                            timeout: 30s
                            hash_policy:
                              - connection_properties:
                                  source_ip: true
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # IDAgent Metrics (port 2112)
    - name: metrics
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 2112
          protocol: TCP
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: metrics
                codec_type: AUTO
                route_config:
                  name: metrics_route
                  virtual_hosts:
                    - name: idagent_metrics
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: idagent_metrics
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # WireGuard TCP — ring hash for source-IP sticky sessions
    - name: idagent_wg_tcp
      type: STRICT_DNS
      connect_timeout: 5s
      dns_refresh_rate: 5s
      dns_lookup_family: V4_ONLY
      lb_policy: RING_HASH
      load_assignment:
        cluster_name: idagent_wg_tcp
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: idagent
                      port_value: 19818

    # WireGuard UDP — ring hash for source-IP sticky sessions
    - name: idagent_wg_udp
      type: STRICT_DNS
      connect_timeout: 5s
      dns_refresh_rate: 5s
      dns_lookup_family: V4_ONLY
      lb_policy: RING_HASH
      load_assignment:
        cluster_name: idagent_wg_udp
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: idagent
                      port_value: 19818

    # HTTP API — ring hash with health checks
    - name: idagent_api
      type: STRICT_DNS
      connect_timeout: 5s
      dns_refresh_rate: 5s
      dns_lookup_family: V4_ONLY
      lb_policy: RING_HASH
      load_assignment:
        cluster_name: idagent_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: idagent
                      port_value: 8080
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /liveness

    # Metrics — round-robin to scrape all replicas
    - name: idagent_metrics
      type: STRICT_DNS
      connect_timeout: 5s
      dns_refresh_rate: 5s
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: idagent_metrics
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: idagent
                      port_value: 2112
