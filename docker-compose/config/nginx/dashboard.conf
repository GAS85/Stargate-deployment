server {
    listen 8080 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # OAuth callback sets large session cookies; raise buffer limits to prevent
    # "upstream sent too big header" 502 errors on /api/auth/callback
    proxy_buffer_size          32k;
    proxy_buffers              8 32k;
    proxy_busy_buffers_size    64k;

    # /api/internal/* is for in-cluster callers only (e.g. idagent fetching
    # its installation-config). Those services reach the dashboard directly
    # at http://dashboard:3000 over the Docker network and never traverse
    # this public proxy. Rewrite external hits to a non-existent dashboard
    # route so Next.js's built-in notFound() flow renders (HTTP 404) —
    # styled like the rest of the dashboard and hides the existence of
    # the internal API surface.
    # DOES NOT WORK !!!
    # location /api/internal/ {
    #     rewrite ^ /_blocked? break;
    #     proxy_pass http://dashboard:3000;

    #     proxy_set_header Host               $http_host;
    #     proxy_set_header X-Real-IP          $remote_addr;
    #     proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Host   $http_host;
    #     proxy_set_header X-Forwarded-Proto  https;
    # }

    location / {
        proxy_pass http://dashboard:3000;

        proxy_set_header Host               $http_host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host   $http_host;
        proxy_set_header X-Forwarded-Proto  https;

        # Required for Next.js WebSocket (hot reload / streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
