server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    timeout: 30s

scrape_configs:
  - job_name: stargate-apps
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values:
              - com.docker.compose.service=smimekeys-client
              - com.docker.compose.service=policy
              - com.docker.compose.service=idagent
              - com.docker.compose.service=mxengine
    relabel_configs:
      # Keep only our app containers
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(smimekeys-client|policy|idagent|mxengine)'
        action: keep
      # Extract container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Use compose service name as service label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Extract replica number for scaled services
      - source_labels: ['__meta_docker_container_label_com_docker_compose_container_number']
        target_label: replica
      # Add static labels
      - replacement: ${HOSTNAME}
        target_label: environment
      - replacement: ${HOSTNAME}
        target_label: host
    pipeline_stages:
      # Try to parse JSON logs
      - json:
          expressions:
            level: level
            msg: msg
            message: message
            ts: ts
            time: time
        # Don't fail if not JSON
      - labels:
          level:
      # Fallback for non-JSON logs
      - match:
          selector: '{container=~".+"}'
          stages:
            - regex:
                expression: '(?P<level>INFO|WARN|ERROR|DEBUG|info|warn|error|debug)'
            - labels:
                level:
