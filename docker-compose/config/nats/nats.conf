# NATS server config — internal-only deployment.
# The 4222 client port is NOT published to the host (see docker-compose.yml).
# Only services on the stargate-network can reach it.
#
# The monitoring port (8222) is enabled via the -m flag in docker-compose.yml.

port: 4222
http_port: 8222

# Add auth here if you want defense-in-depth on top of network isolation:
#
# authorization {
#   token: "$NATS_AUTH_TOKEN"
# }
