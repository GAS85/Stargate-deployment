# ==============================================================================
# HAProxy configuration for IDAgent load balancing
# ==============================================================================
# Routes WireGuard TCP and HTTP API traffic to scaled idagent instances
# with source-IP sticky sessions to ensure tunnel stability.
#
# Architecture:
#   External :19818 (WG TCP) ──► HAProxy ──► idagent instances (sticky by src IP)
#   Internal :8080  (HTTP)   ──► HAProxy ──► idagent instances (sticky by src IP)
#   Stats    :8404           ──► HAProxy stats page
# ==============================================================================

global
    log stdout format raw local0
    maxconn 2048

# Docker embedded DNS for service discovery (resolves scaled replicas)
resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s
    accepted_payload_size 8192

defaults
    log     global
    timeout connect 10s
    timeout client  300s
    timeout server  300s
    retries 3

# ------------------------------------------------------------------------------
# Stats page — http://localhost:8404/
# ------------------------------------------------------------------------------
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats show-legends
    stats show-node

# ------------------------------------------------------------------------------
# WireGuard TCP tunnel — sticky by remote peer source IP
# Ensures the same remote peer always reaches the same idagent instance,
# maintaining the WG handshake state and tunnel continuity.
# ------------------------------------------------------------------------------
frontend wg_front
    bind *:19818
    mode tcp
    option tcplog
    default_backend idagent_wg

backend idagent_wg
    mode tcp
    balance source
    stick-table type ip size 256 expire 60m
    stick on src
    server-template idagent- 1-10 idagent:19818 check resolvers docker_dns init-addr libc,none

# ------------------------------------------------------------------------------
# IDAgent HTTP API — sticky by source IP
# Internal services (mxengine, smimekeys) consistently hit the same instance.
# ------------------------------------------------------------------------------
frontend http_front
    bind *:8080
    mode http
    option httplog
    default_backend idagent_http

backend idagent_http
    mode http
    balance source
    stick-table type ip size 256 expire 30m
    stick on src
    option httpchk GET /liveness
    http-check expect status 200
    server-template idagent- 1-10 idagent:8080 check resolvers docker_dns init-addr libc,none

# ------------------------------------------------------------------------------
# IDAgent Metrics — round-robin (scrape all instances)
# ------------------------------------------------------------------------------
frontend metrics_front
    bind *:2112
    mode http
    default_backend idagent_metrics

backend idagent_metrics
    mode http
    balance roundrobin
    server-template idagent- 1-10 idagent:2112 check resolvers docker_dns init-addr libc,none
